  {id:"l1",name:"Xiaohongshu",emoji:"📕",color:"#FF2442",url:"https://www.xiaohongshu.com"},
  {id:"l2",name:"LinkedIn",emoji:"💼",color:"#0A66C2",url:"https://www.linkedin.com"},

// Keyword matcher
const KW={
  product:['app store','testflight','build','deploy','release','bug','fix','crash','feature','update','version','ios','android','web','python','api','sdk','framework','database','server','frontend','backend','ui','ux','design','code','commit','merge','repo','xcode','swift','react native','expo'],
  content:['linkedin','xiaohongshu','小红书','product hunt','xianyu','闲鱼','douyin','抖音','github','wechat','微信','post','article','blog','video','publish','draft','content','social media','schedule','marketing','公众号','bilibili','weibo','微博'],
  revenue:['¥','￥','$','revenue','income','payment','paid','earning','profit','sales','subscription','purchase','transaction','invoice','billing','monetize','收入','收益','营收','利润','rmb','yuan','dollar','price','alipay','支付宝','微信支付'],
  bd:['investor','investment','funding','seed','vc','angel','employer','job','offer','interview','hire','recruiter','partner','partnership','deal','contract','government','grant','subsidy','meeting','pitch','proposal','negotiation','valuation','equity','投资','融资','合作','面试','招聘'],
};
function suggestMod(text){
  if(!text.trim())return[{m:"product",c:0},{m:"content",c:0},{m:"revenue",c:0},{m:"bd",c:0}];
  const l=text.toLowerCase();
  const s=Object.entries(KW).map(([m,kws])=>({m,s:kws.filter(k=>l.includes(k)).length}));
  const mx=Math.max(...s.map(x=>x.s));
  if(mx===0)return s.map(x=>({m:x.m,c:0}));
  return s.sort((a,b)=>b.s-a.s).map(x=>({m:x.m,c:x.s/mx}));
}
function extractAmt(t){for(const r of[/[¥￥]\s*([\d,]+\.?\d*)/,/\$\s*([\d,]+\.?\d*)/,/([\d,]+\.?\d*)\s*(?:元|yuan|rmb)/i]){const m=t.match(r);if(m){const n=parseFloat(m[1].replace(/,/g,""));if(!isNaN(n))return n;}}return null;}
function extractDate(t){const m=t.match(/(\d{4}[-/]\d{1,2}[-/]\d{1,2})/);if(m){const d=new Date(m[1].replace(/\//g,"-"));if(!isNaN(d.getTime()))return d.toISOString().split("T")[0];}return null;}

// i18n
const I18N={
en:{commandCenter:"Command Center",goodMorning:"Good Morning",goodAfternoon:"Good Afternoon",goodEvening:"Good Evening",dashboard:"Dashboard",products:"Products",content:"Content",revenueBD:"Revenue & BD",settings:"Settings",activeProducts:"Active Products",contentThisWeek:"Content This Week",revenueMonth:"Revenue (Month)",activeBD:"Active BD",todaysFocus:"Today's Focus",alerts:"Alerts",overdue:"Overdue",noPriorityTasks:"No priority tasks. Add some from Products tab.",noTasks:"No tasks",backlog:"Backlog",inProgress:"In Progress",review:"Review",live:"Live",needsFix:"Needs Fix",draft:"Draft",ready:"Ready",published:"Published",noContentYet:"No content items yet",revenue:"Revenue",bdPipeline:"BD Pipeline",thisMonth:"This Month",recentEntries:"Recent Entries",noRevenueYet:"No revenue entries yet",lead:"Lead",contacted:"Contacted",discussion:"Discussion",offerDeal:"Offer/Deal",closedLost:"Closed/Lost",darkMode:"Dark Mode",language:"Language",exportData:"Export Data",importData:"Import Data",resetAllData:"Reset All Data",save:"Save",cancel:"Cancel",title:"Title",description:"Description",status:"Status",dueDate:"Due Date",notes:"Notes",platform:"Platform",amount:"Amount (¥)",source:"Source",name:"Name",type:"Type",stage:"Stage",nextAction:"Next Action",delete:"Delete",add:"Add",newTask:"+ Task",newContent:"+ Content",addRevenue:"+ Revenue",newContact:"+ Contact",product:"Product",priority:"Priority",appearance:"APPEARANCE",data:"DATA",about:"ABOUT",version:"v1.0 Desktop",allDataLocal:"All data stored locally in browser",appPortal:"APP PORTAL",open:"Open",xiaohongshu:"Xiaohongshu",linkedin:"LinkedIn",wechat:"WeChat",douyin:"Douyin",github:"GitHub",producthunt:"Product Hunt",xianyu:"Xianyu",smartImport:"Smart Import",pasteText:"Paste or type content to import...",suggestedModule:"Suggested Module",productTask:"Product Task",contentItem:"Content Item",revenueEntry:"Revenue Entry",bdContact:"BD Contact",match:"MATCH",noTextYet:"Paste text or upload a file to auto-detect module.",importSuccess:"Imported!",dropOrClick:"Drop files here or click to upload",changeFile:"Change file",or:"OR",fileTypes:"Images · PDF · TXT · CSV · JSON"},
zh:{commandCenter:"指挥中心",goodMorning:"早上好",goodAfternoon:"下午好",goodEvening:"晚上好",dashboard:"仪表盘",products:"产品",content:"内容",revenueBD:"收入 & 商务",settings:"设置",activeProducts:"活跃产品",contentThisWeek:"本周内容",revenueMonth:"本月收入",activeBD:"活跃商务",todaysFocus:"今日重点",alerts:"提醒",overdue:"已逾期",noPriorityTasks:"暂无优先任务，从产品页添加。",noTasks:"暂无任务",backlog:"待办",inProgress:"进行中",review:"审核",live:"已上线",needsFix:"待修复",draft:"草稿",ready:"就绪",published:"已发布",noContentYet:"暂无内容项目",revenue:"收入",bdPipeline:"商务管线",thisMonth:"本月",recentEntries:"最近记录",noRevenueYet:"暂无收入记录",lead:"线索",contacted:"已联系",discussion:"洽谈中",offerDeal:"报价/成交",closedLost:"关闭/流失",darkMode:"深色模式",language:"语言",exportData:"导出数据",importData:"导入数据",resetAllData:"重置所有数据",save:"保存",cancel:"取消",title:"标题",description:"描述",status:"状态",dueDate:"截止日期",notes:"备注",platform:"平台",amount:"金额 (¥)",source:"来源",name:"名称",type:"类型",stage:"阶段",nextAction:"下一步",delete:"删除",add:"添加",newTask:"+ 任务",newContent:"+ 内容",addRevenue:"+ 收入",newContact:"+ 联系人",product:"产品",priority:"优先级",appearance:"外观",data:"数据",about:"关于",version:"v1.0 桌面版",allDataLocal:"所有数据存储在浏览器本地",appPortal:"应用入口",open:"打开",xiaohongshu:"小红书",linkedin:"LinkedIn",wechat:"微信",douyin:"抖音",github:"GitHub",producthunt:"Product Hunt",xianyu:"闲鱼",smartImport:"快速导入",pasteText:"粘贴或输入要导入的内容...",suggestedModule:"建议模块",productTask:"产品任务",contentItem:"内容项",revenueEntry:"收入记录",bdContact:"商务联系人",match:"匹配",noTextYet:"粘贴文本或上传文件，自动检测模块。",importSuccess:"导入成功！",dropOrClick:"拖拽文件到此处或点击上传",changeFile:"更换文件",or:"或者",fileTypes:"图片 · PDF · TXT · CSV · JSON"}
};

// ─── State ───
const KEY="command_center_data";
const uid=()=>Math.random().toString(36).slice(2,10);
function def(){return{products:[],tasks:[],contentItems:[],revenueEntries:[],bdContacts:[],links:DEFAULT_LINKS.map(l=>({...l})),darkMode:true,language:"en"};}
let D;try{const s=localStorage.getItem(KEY);D=s?{...def(),...JSON.parse(s)}:def();if(!D.links)D.links=DEFAULT_LINKS.map(l=>({...l}));}catch(e){D=def();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}}
function t(k){return(I18N[D.language]||I18N.en)[k]||k;}
function th(){return D.darkMode?C.dark:C.light;}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function badge(label,color,bg){return`<span style="display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;color:${color};background:${bg}">${label}</span>`;}

let currentTab="dashboard";
let importText="";
let importPreview=null;

// ─── Global action functions (called from inline onclick) ───
window.CC={
  tab(k){currentTab=k;render();},
  toggleDark(){D.darkMode=!D.darkMode;save();render();},
  setLang(l){D.language=l;save();render();},
  closeModal(){document.getElementById("modal-overlay")?.remove();},
  exportData(){const b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="command_center_backup.json";a.click();},
  importFile(){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=()=>{try{Object.assign(D,{...def(),...JSON.parse(r.result)});save();render();}catch(e){alert("Invalid JSON");}};r.readAsText(f);}};i.click();},
  resetData(){if(confirm(D.language==="zh"?"确定重置所有数据？":"Reset all data?")){Object.assign(D,def());save();render();}},
  // Task actions
  moveTask(id,to){const t=D.tasks.find(x=>x.id===id);if(t){t.status=to;t.updatedAt=new Date().toISOString();}save();render();},
  completeTask(id){const t=D.tasks.find(x=>x.id===id);if(t){t.completed=true;t.archived=true;}save();render();},
  deleteTask(id){D.tasks=D.tasks.filter(x=>x.id!==id);save();render();},
  // Content actions
  setContentStatus(id,s){const c=D.contentItems.find(x=>x.id===id);if(c)c.status=s;save();render();},
  deleteContent(id){D.contentItems=D.contentItems.filter(x=>x.id!==id);save();render();},
  // Revenue
  deleteRevenue(id){D.revenueEntries=D.revenueEntries.filter(x=>x.id!==id);save();render();},
  // BD
  moveBD(id,to){const b=D.bdContacts.find(x=>x.id===id);if(b)b.stage=to;save();render();},
  deleteBD(id){D.bdContacts=D.bdContacts.filter(x=>x.id!==id);save();render();},
  // Links management
  addLink(){showModal("addLink");},
  deleteLink(id){D.links=D.links.filter(l=>l.id!==id);save();showModal("editLinks");},
  saveNewLink(){
    const name=document.getElementById("f-linkname")?.value.trim();
    const url=document.getElementById("f-linkurl")?.value.trim();
    const emoji=document.getElementById("f-linkemoji")?.value.trim()||"🔗";
    const color=document.getElementById("f-linkcolor")?.value||"#0F9B8E";
    if(name&&url){D.links.push({id:uid(),name,emoji,color,url:url.startsWith("http")?url:"https://"+url});save();CC.closeModal();render();}
  },
  saveEditLink(id){
    const l=D.links.find(x=>x.id===id);if(!l)return;
    const name=document.getElementById("f-eln-"+id)?.value.trim();
    const url=document.getElementById("f-elu-"+id)?.value.trim();
    const emoji=document.getElementById("f-ele-"+id)?.value.trim();
    if(name)l.name=name;if(url)l.url=url.startsWith("http")?url:"https://"+url;if(emoji)l.emoji=emoji;
    save();showModal("editLinks");
  },
  // Modals
  openModal(type){showModal(type);},
  // Smart import
  openImport(){importText="";importPreview=null;showModal("import");},
  doImport(mod){
    const today=new Date().toISOString().split("T")[0];
    const dt=extractDate(importText);const amt=extractAmt(importText);
    if(mod==="product")D.tasks.push({id:uid(),productId:D.products[0]?.id||"",title:importText.slice(0,100),description:importText,priority:"P1",status:"backlog",dueDate:dt||"",notes:"",subtasks:[],pinned:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),archived:false,completed:false});
    else if(mod==="content")D.contentItems.push({id:uid(),platform:"LinkedIn",title:importText.slice(0,100),scheduledDate:dt||today,status:"draft",notes:importText,archived:false});
    else if(mod==="revenue")D.revenueEntries.push({id:uid(),date:dt||today,source:importText.slice(0,60),amount:amt||0,notes:importText});
    else if(mod==="bd")D.bdContacts.push({id:uid(),name:importText.slice(0,60),type:"Partner",stage:"lead",lastContact:today,nextAction:"",notes:importText,archived:false});
    save();CC.closeModal();
    // Flash success then render
    const T=th();const mE={product:"📦",content:"📝",revenue:"💰",bd:"🤝"};const mL={product:t("productTask"),content:t("contentItem"),revenue:t("revenueEntry"),bd:t("bdContact")};
    const flash=document.createElement("div");flash.style.cssText=`position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:${T.surface};border:1px solid ${T.border};border-radius:16px;padding:32px 48px;text-align:center;z-index:2000;box-shadow:0 20px 60px rgba(0,0,0,.4)`;
    flash.innerHTML=`<div style="font-size:48px;margin-bottom:10px">✅</div><div style="font-size:16px;font-weight:600;color:${T.text}">${t("importSuccess")}</div><div style="font-size:13px;color:${T.textMuted};margin-top:4px">${mE[mod]} ${mL[mod]}</div>`;
    document.body.appendChild(flash);
    setTimeout(()=>{flash.remove();importText="";importPreview=null;render();},1000);
  },
  // Save forms
  saveProduct(){
    const n=document.getElementById("f-name")?.value.trim();
    const c=(document.getElementById("f-code")?.value.trim()||"A").toUpperCase().slice(0,1);
    const p=document.getElementById("f-platform")?.value||"iOS";
    if(n){D.products.push({id:uid(),code:c,name:n,platform:p,status:"backlog",color:C.product[c]||C.primary});save();CC.closeModal();render();}
  },
  saveTask(){
    const title=document.getElementById("f-title")?.value.trim();
    if(title){D.tasks.push({id:uid(),productId:document.getElementById("f-product")?.value||"",title,description:document.getElementById("f-desc")?.value||"",priority:document.getElementById("f-priority")?.value||"P1",status:document.getElementById("f-status")?.value||"backlog",dueDate:document.getElementById("f-due")?.value||"",notes:document.getElementById("f-notes")?.value||"",subtasks:[],pinned:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),archived:false,completed:false});save();CC.closeModal();render();}
  },
  saveContent(){
    const title=document.getElementById("f-title")?.value.trim();
    if(title){D.contentItems.push({id:uid(),platform:document.getElementById("f-platform")?.value||"LinkedIn",title,scheduledDate:document.getElementById("f-date")?.value||new Date().toISOString().split("T")[0],status:document.getElementById("f-status")?.value||"draft",notes:document.getElementById("f-notes")?.value||"",archived:false});save();CC.closeModal();render();}
  },
  saveRevenue(){
    const src=document.getElementById("f-source")?.value.trim();
    const amt=parseFloat(document.getElementById("f-amount")?.value);
    if(src&&!isNaN(amt)){D.revenueEntries.push({id:uid(),date:document.getElementById("f-date")?.value||new Date().toISOString().split("T")[0],source:src,amount:amt,notes:document.getElementById("f-notes")?.value||""});save();CC.closeModal();render();}
  },
  saveBD(){
    const name=document.getElementById("f-name")?.value.trim();
    if(name){D.bdContacts.push({id:uid(),name,type:document.getElementById("f-type")?.value||"Investor",stage:document.getElementById("f-stage")?.value||"lead",lastContact:new Date().toISOString().split("T")[0],nextAction:document.getElementById("f-next")?.value||"",notes:document.getElementById("f-notes")?.value||"",archived:false});save();CC.closeModal();render();}
  },
};

// Handle file upload in import modal
window.handleImportFile=function(input){
  const file=input.files?.[0];if(!file)return;
  if(file.type.startsWith("image/")){
    const r=new FileReader();r.onload=ev=>{importPreview={type:"image",name:file.name,url:ev.target.result};importText+=(importText?"\n":"")+"[Image: "+file.name+"] ";refreshImportModal();};r.readAsDataURL(file);
  }else if(file.type==="application/pdf"){
    importPreview={type:"file",name:file.name};importText+=(importText?"\n":"")+"[PDF: "+file.name+"] ";refreshImportModal();
  }else{
    const r=new FileReader();r.onload=ev=>{importPreview={type:"file",name:file.name};importText+=(importText?"\n":"")+ev.target.result.slice(0,3000);refreshImportModal();};r.readAsText(file);
  }
};
window.onImportTextChange=function(el){importText=el.value;refreshImportModal();};
window.clearImportPreview=function(){importPreview=null;refreshImportModal();};

function refreshImportModal(){
  const body=document.getElementById("import-body");
  if(body)body.innerHTML=importModalBody();
}

// ─── Form helpers ───
function inp(T,id,label,type,val,ph){
  if(type==="textarea")return`<div style="margin-bottom:10px">${label?`<label style="display:block;font-size:11px;font-weight:600;color:${T.textSec};margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${label}</label>`:""}<textarea id="${id}" placeholder="${ph||""}" rows="3" style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid ${T.border};background:${T.surfaceLight};color:${T.text};font-size:13px;outline:none;box-sizing:border-box;resize:vertical;font-family:inherit">${esc(val||"")}</textarea></div>`;
  return`<div style="margin-bottom:10px">${label?`<label style="display:block;font-size:11px;font-weight:600;color:${T.textSec};margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${label}</label>`:""}<input id="${id}" type="${type||"text"}" value="${esc(val||"")}" placeholder="${ph||""}" style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid ${T.border};background:${T.surfaceLight};color:${T.text};font-size:13px;outline:none;box-sizing:border-box"></div>`;
}
function sel(T,id,label,opts,val){
  return`<div style="margin-bottom:10px"><label style="display:block;font-size:11px;font-weight:600;color:${T.textSec};margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${label}</label><select id="${id}" style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid ${T.border};background:${T.surfaceLight};color:${T.text};font-size:13px;outline:none;box-sizing:border-box">${opts.map(o=>{const v=typeof o==="string"?o:o.v,l=typeof o==="string"?o:o.l;return`<option value="${v}"${val===v?" selected":""}>${l}</option>`;}).join("")}</select></div>`;
}

// ─── Modal system ───
function showModal(type){
  CC.closeModal();
  const T=th();
  const ov=document.createElement("div");
  ov.id="modal-overlay";
  ov.style.cssText=`position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)`;
  ov.onclick=e=>{if(e.target===ov)CC.closeModal();};

  const box=document.createElement("div");
  box.style.cssText=`background:${T.surface};border-radius:14px;padding:20px;width:92%;max-width:${type==="import"?560:440}px;max-height:82vh;overflow:auto;border:1px solid ${T.border}`;
  box.onclick=e=>e.stopPropagation();

  let title="",body="";
  const hdr=(t)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="margin:0;font-size:16px;color:${T.text}">${t}</h3><button onclick="CC.closeModal()" style="background:none;border:none;color:${T.textMuted};font-size:20px;cursor:pointer;line-height:1">×</button></div>`;
  const btns=(saveFunc)=>`<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px"><button onclick="CC.closeModal()" style="padding:6px 14px;border-radius:7px;border:1px solid ${C.primary};background:transparent;color:${C.primary};font-size:12px;font-weight:600;cursor:pointer">${t("cancel")}</button><button onclick="CC.${saveFunc}()" style="padding:6px 14px;border-radius:7px;border:none;background:${C.primary};color:#fff;font-size:12px;font-weight:600;cursor:pointer">${t("save")}</button></div>`;
  const colL={backlog:t("backlog"),in_progress:t("inProgress"),review:t("review"),live:t("live"),needs_fix:t("needsFix")};
  const sL={draft:t("draft"),ready:t("ready"),published:t("published")};
  const stL={lead:t("lead"),contacted:t("contacted"),in_discussion:t("discussion"),offer_deal:t("offerDeal"),closed_lost:t("closedLost")};

  if(type==="import"){
    box.innerHTML=hdr("📎 "+t("smartImport"))+`<div id="import-body">${importModalBody()}</div>`;

function importModalBody(){
  const T=th();
  const mE={product:"📦",content:"📝",revenue:"💰",bd:"🤝"};
  const mL={product:t("productTask"),content:t("contentItem"),revenue:t("revenueEntry"),bd:t("bdContact")};
  const mC={product:C.primary,content:"#45B7D1",revenue:"#4ECDC4",bd:"#DDA0DD"};

  let h=`<div id="drop-zone" onclick="document.getElementById('import-file-input').click()" style="border:2px dashed ${T.border};border-radius:10px;padding:18px;text-align:center;margin-bottom:10px;cursor:pointer">`;
  if(importPreview){
    h+=`<div style="display:flex;align-items:center;gap:10px;justify-content:center">`;
    if(importPreview.type==="image"&&importPreview.url)h+=`<img src="${importPreview.url}" style="width:50px;height:50px;object-fit:cover;border-radius:6px">`;
    else h+=`<span style="font-size:28px">📄</span>`;
    h+=`<div style="text-align:left"><div style="font-size:12px;font-weight:600;color:${T.text}">${esc(importPreview.name)}</div><div onclick="event.stopPropagation();clearImportPreview()" style="font-size:10px;color:${C.primary};cursor:pointer">${t("changeFile")}</div></div></div>`;
  }else{
    h+=`<div style="font-size:28px;margin-bottom:4px">📁</div><div style="font-size:13px;font-weight:600;color:${T.text};margin-bottom:3px">${t("dropOrClick")}</div><div style="font-size:11px;color:${T.textMuted}">${t("fileTypes")}</div>`;
  }
  h+=`</div><input type="file" id="import-file-input" accept="image/*,.pdf,.txt,.csv,.json,.md" onchange="handleImportFile(this)" style="display:none">`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="flex:1;height:1px;background:${T.border}"></div><span style="font-size:10px;color:${T.textMuted};font-weight:600">${t("or")}</span><div style="flex:1;height:1px;background:${T.border}"></div></div>`;
  h+=`<textarea oninput="onImportTextChange(this)" placeholder="${t("pasteText")}" rows="3" style="width:100%;padding:10px;border-radius:9px;border:1px solid ${T.border};background:${T.surfaceLight};color:${T.text};font-size:13px;resize:vertical;outline:none;box-sizing:border-box;font-family:inherit;margin-bottom:14px">${esc(importText)}</textarea>`;

  if(importText.trim()){
    const sugs=suggestMod(importText);
    h+=`<div style="font-size:11px;font-weight:700;color:${T.textSec};margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${t("suggestedModule")}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
    sugs.forEach(s=>{
      h+=`<button onclick="CC.doImport('${s.m}')" style="display:flex;align-items:center;gap:8px;padding:12px;border-radius:10px;border:1px solid ${s.c>=1?mC[s.m]:T.border};background:${s.c>=1?mC[s.m]+"15":T.surfaceLight};cursor:pointer;text-align:left" class="hover-lift"><span style="font-size:22px">${mE[s.m]}</span><div style="flex:1"><div style="font-size:12px;font-weight:600;color:${T.text}">${mL[s.m]}</div>${s.c>=1?`<span style="font-size:9px;font-weight:700;color:${mC[s.m]};background:${mC[s.m]}22;padding:1px 5px;border-radius:3px">${t("match")}</span>`:""}</div><span style="font-size:11px;color:${mC[s.m]};font-weight:700">→</span></button>`;
    });
    h+=`</div>`;
    const amt=extractAmt(importText);const dt=extractDate(importText);
    if(amt!==null||dt)h+=`<div style="margin-top:10px;display:flex;gap:6px">${amt!==null?badge("¥"+amt.toLocaleString(),"#4ECDC4","#4ECDC422"):""}${dt?badge(dt,"#45B7D1","#45B7D122"):""}</div>`;
  }else{
    h+=`<div style="text-align:center;padding:14px;color:${T.textMuted};font-size:12px">${t("noTextYet")}</div>`;
  }
  return h;
}

// ─── Main Render ───
function render(){
  const T=th();
  document.body.style.background=T.bg;
  const app=document.getElementById("app");
  app.innerHTML="";
  app.style.cssText=`display:flex;height:100vh;color:${T.text}`;

  // Sidebar
  const tabs=[{k:"dashboard",i:"📊"},{k:"products",i:"📦"},{k:"content",i:"📝"},{k:"revenueBD",i:"💰"},{k:"settings",i:"⚙️"}];
  let sb=`<div style="width:200px;background:${T.surface};border-right:1px solid ${T.border};display:flex;flex-direction:column;flex-shrink:0">`;
  sb+=`<div style="padding:18px 14px;border-bottom:1px solid ${T.border}"><div style="font-size:18px;font-weight:800;color:${C.primary}">⌘ Command</div><div style="font-size:10px;color:${T.textMuted}">Center</div></div>`;
  sb+=`<nav style="flex:1;padding:6px">`;
  tabs.forEach(tb=>{
    sb+=`<button onclick="CC.tab('${tb.k}')" style="display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:9px;border:none;background:${currentTab===tb.k?C.primary+"18":"transparent"};color:${currentTab===tb.k?C.primary:T.textSec};font-size:13px;font-weight:${currentTab===tb.k?700:500};cursor:pointer;margin-bottom:2px;text-align:left">${tb.i} ${t(tb.k)}</button>`;
  });
  sb+=`</nav><div style="padding:12px;border-top:1px solid ${T.border};font-size:10px;color:${T.textMuted}">${t("version")} · localStorage</div></div>`;

  // Main content
  let main="";
  if(currentTab==="dashboard")main=renderDashboard(T);
  else if(currentTab==="products")main=renderProducts(T);
  else if(currentTab==="content")main=renderContent(T);
  else if(currentTab==="revenueBD")main=renderRevenue(T);
  else if(currentTab==="settings")main=renderSettings(T);

  app.innerHTML=sb+`<div style="flex:1;overflow:auto">${main}</div>`;
}

function renderDashboard(T){
  const active=D.tasks.filter(t=>!t.archived&&!t.completed);
  const now=new Date(),h=now.getHours();
  const greet=h<12?t("goodMorning"):h<18?t("goodAfternoon"):t("goodEvening");
  const mRev=D.revenueEntries.filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).reduce((s,r)=>s+r.amount,0);
  const wS=new Date(now);wS.setDate(wS.getDate()-wS.getDay());const wE=new Date(wS);wE.setDate(wE.getDate()+7);
  const cW=D.contentItems.filter(c=>!c.archived&&c.status!=="published"&&new Date(c.scheduledDate)>=wS&&new Date(c.scheduledDate)<=wE).length;
  const aBD=D.bdContacts.filter(b=>!b.archived&&b.stage!=="closed_lost").length;
  const focus=active.filter(t=>t.pinned).concat(active.filter(t=>!t.pinned&&t.dueDate).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate))).slice(0,3);
  const overdue=active.filter(t=>t.dueDate&&new Date(t.dueDate)<now);
  const pMap={};D.products.forEach(p=>pMap[p.id]=p);

  return`<div style="padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
      <div><div style="font-size:11px;font-weight:600;color:${T.textSec};text-transform:uppercase;letter-spacing:1px">${t("commandCenter")}</div><div style="font-size:26px;font-weight:700">${greet}</div></div>
      <button onclick="CC.openImport()" style="width:40px;height:40px;border-radius:12px;border:1px solid ${T.border};background:${T.surface};cursor:pointer;font-size:18px" title="${t("smartImport")}">📎</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px">
      ${[{l:t("activeProducts"),v:D.products.length,c:C.primary,e:"📦"},{l:t("contentThisWeek"),v:cW,c:"#45B7D1",e:"📝"},{l:t("revenueMonth"),v:"¥"+mRev.toLocaleString(),c:"#4ECDC4",e:"💰"},{l:t("activeBD"),v:aBD,c:"#DDA0DD",e:"🤝"}].map(s=>`<div style="background:${T.surface};border:1px solid ${T.border};border-radius:12px;padding:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:${T.textSec}">${s.l}</span><span>${s.e}</span></div><div style="font-size:22px;font-weight:700;color:${s.c}">${s.v}</div></div>`).join("")}
    </div>
    <div style="margin-bottom:20px">
      <div style="font-size:15px;font-weight:700;margin-bottom:10px">🎯 ${t("todaysFocus")}</div>
      ${focus.length===0?`<div style="color:${T.textMuted};font-size:12px;padding:18px;text-align:center;background:${T.surface};border-radius:10px;border:1px solid ${T.border}">${t("noPriorityTasks")}</div>`:focus.map(task=>`<div style="background:${T.surface};border:1px solid ${T.border};border-radius:9px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8"><div style="width:3px;height:28px;border-radius:2px;background:${pMap[task.productId]?.color||C.primary}"></div><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(task.title)}</div><div style="font-size:10px;color:${T.textMuted}">${pMap[task.productId]?.code||""} · ${task.priority}${task.dueDate?" · "+task.dueDate:""}</div></div>${badge(task.status.replace(/_/g," "),C.status[task.status],C.status[task.status]+"22")}</div>`).join("")}
    </div>
    ${overdue.length>0?`<div style="margin-bottom:20px"><div style="font-size:15px;font-weight:700;margin-bottom:10px">⚠️ ${t("alerts")} <span style="background:${C.accent};color:#fff;border-radius:8px;padding:1px 7px;font-size:10px">${overdue.length}</span></div>${overdue.slice(0,5).map(task=>`<div style="background:${T.surface};border:1px solid ${C.accent}33;border-radius:9px;padding:8px;margin-bottom:5px;display:flex;align-items:center;gap:6"><div style="width:7px;height:7px;border-radius:4px;background:${C.accent}"></div><div style="flex:1;font-size:12px">${esc(task.title)}</div><span style="font-size:10px;color:${C.accent}">${t("overdue")}</span></div>`).join("")}</div>`:""}
    <div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:11px;font-weight:700;color:${T.textSec};text-transform:uppercase;letter-spacing:.5px">🔗 ${t("appPortal")}</span><button onclick="CC.openModal('editLinks')" style="padding:2px 8px;border-radius:5px;border:1px solid ${T.border};background:transparent;color:${T.textSec};font-size:10px;cursor:pointer">✏️ Edit</button></div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">${(D.links||[]).map(l=>`<a href="${l.url}" target="_blank" rel="noopener" style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:72px;padding:10px;border-radius:12px;border:1px solid ${T.border};background:${T.surface};text-decoration:none"><div style="width:38px;height:38px;border-radius:10px;background:${l.color}18;display:flex;align-items:center;justify-content:center;font-size:20px">${l.emoji}</div><span style="font-size:11px;font-weight:600;color:${T.text}">${esc(l.name)}</span><span style="font-size:9px;font-weight:700;color:${l.color};background:${l.color}15;padding:1px 5px;border-radius:3px">${t("open")}</span></a>`).join("")}</div></div>
  </div>`;
}

function renderProducts(T){
  const active=D.tasks.filter(t=>!t.archived&&!t.completed);
  const pMap={};D.products.forEach(p=>pMap[p.id]=p);
  const colL={backlog:t("backlog"),in_progress:t("inProgress"),review:t("review"),live:t("live"),needs_fix:t("needsFix")};
  const cols={};KANBAN.forEach(k=>cols[k]=active.filter(t=>t.status===k));

  if(D.products.length===0)return`<div style="padding:24px;height:100%;display:flex;flex-direction:column"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="margin:0;font-size:18px">${t("products")}</h2><button onclick="CC.openModal('addProduct')" style="padding:6px 14px;border-radius:7px;border:none;background:${C.primary};color:#fff;font-size:12px;font-weight:600;cursor:pointer">${t("add")} ${t("product")}</button></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:${T.textMuted};gap:10px"><div style="font-size:44px">📦</div><div style="font-size:15px;font-weight:600">No products yet</div><div style="font-size:12px">Add your first product to get started</div></div></div>`;

  h+=`<div style="display:flex;gap:10px;overflow-x:auto;flex:1;padding-bottom:10px">`;
  KANBAN.forEach(col=>{
    h+=`<div style="min-width:230px;width:230px;background:${T.surface}99;border-radius:12px;padding:10px;display:flex;flex-direction:column"><div style="display:flex;align-items:center;gap:5px;margin-bottom:10px"><div style="width:7px;height:7px;border-radius:4px;background:${C.status[col]}"></div><span style="font-size:13px;font-weight:700;flex:1">${colL[col]}</span><span style="font-size:10px;color:${T.textSec};background:${T.surfaceLight};border-radius:6px;padding:1px 6px">${cols[col].length}</span></div><div style="flex:1;overflow-y:auto">`;
    if(cols[col].length===0){h+=`<div style="padding:16px;border:1px dashed ${T.border};border-radius:8px;text-align:center;font-size:11px;color:${T.textMuted}">${t("noTasks")}</div>`;}
    else cols[col].forEach(task=>{
      const nc=KANBAN.indexOf(col)<KANBAN.length-1?KANBAN[KANBAN.indexOf(col)+1]:null;
      h+=`<div style="background:${T.card};border:1px solid ${T.border};border-radius:9px;padding:9px;margin-bottom:6px;border-left:3px solid ${pMap[task.productId]?.color||C.primary}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px"><span style="font-size:12px;font-weight:600;flex:1">${esc(task.title)}</span>${badge(task.priority,C.priority[task.priority],C.priority[task.priority]+"22")}</div><div style="font-size:10px;color:${T.textMuted};margin-bottom:5px">${pMap[task.productId]?.code||""} · ${pMap[task.productId]?.name||""}${task.dueDate?" · "+task.dueDate:""}</div><div style="display:flex;gap:3px;flex-wrap:wrap">${nc?`<button onclick="CC.moveTask('${task.id}','${nc}')" style="padding:3px 8px;border-radius:5px;border:1px solid ${C.primary};background:transparent;color:${C.primary};font-size:10px;font-weight:600;cursor:pointer">→ ${colL[nc]}</button>`:""}<button onclick="CC.completeTask('${task.id}')" style="padding:3px 8px;border-radius:5px;border:1px solid #4ECDC4;background:transparent;color:#4ECDC4;font-size:10px;cursor:pointer">✓</button><button onclick="CC.deleteTask('${task.id}')" style="padding:3px 8px;border-radius:5px;border:1px solid ${C.accent};background:transparent;color:${C.accent};font-size:10px;cursor:pointer">×</button></div></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div></div>`;
  return h;

function renderContent(T){
  const active=D.contentItems.filter(c=>!c.archived);
  const sL={draft:t("draft"),ready:t("ready"),published:t("published")};
  const sC={draft:"#6B6B80",ready:"#FFEAA7",published:C.primary};
  const grouped={};
  active.sort((a,b)=>a.scheduledDate.localeCompare(b.scheduledDate)).forEach(item=>{if(!grouped[item.scheduledDate])grouped[item.scheduledDate]=[];grouped[item.scheduledDate].push(item);});

  let h=`<div style="padding:24px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h2 style="margin:0;font-size:18px">${t("content")}</h2><button onclick="CC.openModal('addContent')" style="padding:6px 14px;border-radius:7px;border:none;background:${C.primary};color:#fff;font-size:12px;font-weight:600;cursor:pointer">${t("newContent")}</button></div>`;
  if(Object.keys(grouped).length===0){h+=`<div style="padding:36px;text-align:center;color:${T.textMuted}"><div style="font-size:44px;margin-bottom:6px">📝</div><div style="font-size:13px">${t("noContentYet")}</div></div>`;}
  else Object.entries(grouped).forEach(([date,items])=>{
    h+=`<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:700;color:${T.textSec};margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px">${new Date(date+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>`;
    items.forEach(item=>{
      h+=`<div style="background:${T.surface};border:1px solid ${T.border};border-radius:9px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;border-left:3px solid ${C.platform[item.platform]||C.primary}"><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(item.title)}</div><div style="font-size:10px;color:${T.textMuted};margin-top:1px">${item.platform}${item.notes?" · "+esc(item.notes):""}</div></div><select onchange="CC.setContentStatus('${item.id}',this.value)" style="padding:2px 6px;border-radius:5px;border:1px solid ${T.border};background:${sC[item.status]}22;color:${sC[item.status]};font-size:10px;font-weight:700">${["draft","ready","published"].map(s=>`<option value="${s}"${item.status===s?" selected":""}>${sL[s]}</option>`).join("")}</select><button onclick="CC.deleteContent('${item.id}')" style="background:none;border:none;color:${C.accent};cursor:pointer;font-size:14px">×</button></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

function renderRevenue(T){
  const now=new Date();
  const mRev=D.revenueEntries.filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).reduce((s,r)=>s+r.amount,0);
  const activeBD=D.bdContacts.filter(b=>!b.archived);
  const stL={lead:t("lead"),contacted:t("contacted"),in_discussion:t("discussion"),offer_deal:t("offerDeal"),closed_lost:t("closedLost")};

  let h=`<div style="padding:24px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="margin:0;font-size:18px">${t("revenue")}</h2><button onclick="CC.openModal('addRevenue')" style="padding:6px 14px;border-radius:7px;border:none;background:${C.primary};color:#fff;font-size:12px;font-weight:600;cursor:pointer">${t("addRevenue")}</button></div>`;
  h+=`<div style="background:${T.surface};border:1px solid ${T.border};border-radius:12px;padding:18px;margin-bottom:20px"><div style="font-size:11px;color:${T.textSec};margin-bottom:3px">${t("thisMonth")}</div><div style="font-size:28px;font-weight:700;color:#4ECDC4">¥${mRev.toLocaleString()}</div></div>`;

  if(D.revenueEntries.length>0){
    h+=`<div style="margin-bottom:24px"><div style="font-size:12px;font-weight:700;color:${T.textSec};margin-bottom:7px">${t("recentEntries")}</div>`;
    [...D.revenueEntries].reverse().slice(0,10).forEach(r=>{
      h+=`<div style="background:${T.surface};border:1px solid ${T.border};border-radius:9px;padding:9px;margin-bottom:5px;display:flex;align-items:center;gap:8px"><div style="flex:1"><span style="font-size:13px;font-weight:600">${esc(r.source)}</span><span style="font-size:10px;color:${T.textMuted};margin-left:6px">${r.date}${r.notes?" · "+esc(r.notes):""}</span></div><span style="font-size:14px;font-weight:700;color:#4ECDC4">¥${r.amount.toLocaleString()}</span><button onclick="CC.deleteRevenue('${r.id}')" style="background:none;border:none;color:${C.accent};cursor:pointer">×</button></div>`;
    });
    h+=`</div>`;
  }else{h+=`<div style="margin-bottom:24px;padding:20px;text-align:center;color:${T.textMuted};font-size:12px">${t("noRevenueYet")}</div>`;}

  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="margin:0;font-size:18px">${t("bdPipeline")}</h2><button onclick="CC.openModal('addBD')" style="padding:6px 14px;border-radius:7px;border:none;background:${C.primary};color:#fff;font-size:12px;font-weight:600;cursor:pointer">${t("newContact")}</button></div>`;
  h+=`<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px">`;
  BD_STAGES.forEach(stage=>{
    const items=activeBD.filter(b=>b.stage===stage);
    h+=`<div style="min-width:180px;background:${T.surface}99;border-radius:10px;padding:8px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:8px"><div style="width:7px;height:7px;border-radius:4px;background:${C.bdStage[stage]}"></div><span style="font-size:12px;font-weight:700;flex:1">${stL[stage]}</span><span style="font-size:10px;color:${T.textSec}">${items.length}</span></div>`;
    items.forEach(b=>{
      const ni=BD_STAGES.indexOf(stage);
      h+=`<div style="background:${T.card};border:1px solid ${T.border};border-radius:7px;padding:7px;margin-bottom:5px"><div style="font-size:12px;font-weight:600">${esc(b.name)}</div><div style="font-size:10px;color:${T.textMuted}">${b.type}${b.nextAction?" · "+esc(b.nextAction):""}</div><div style="display:flex;gap:3px;margin-top:4px">${ni<BD_STAGES.length-1?`<button onclick="CC.moveBD('${b.id}','${BD_STAGES[ni+1]}')" style="padding:2px 7px;border-radius:4px;border:1px solid ${C.primary};background:transparent;color:${C.primary};font-size:10px;cursor:pointer">→</button>`:""}<button onclick="CC.deleteBD('${b.id}')" style="padding:2px 7px;border-radius:4px;border:1px solid ${C.accent};background:transparent;color:${C.accent};font-size:10px;cursor:pointer">×</button></div></div>`;
    });
    if(items.length===0)h+=`<div style="padding:12px;border:1px dashed ${T.border};border-radius:6px;text-align:center;font-size:10px;color:${T.textMuted}">—</div>`;
    h+=`</div>`;
  });
  h+=`</div></div>`;
  return h;
}

function renderSettings(T){
  return`<div style="padding:24px;max-width:480px">
    <h2 style="margin:0 0 20px;font-size:18px">${t("settings")}</h2>
    <div style="font-size:10px;font-weight:700;color:${T.textSec};margin-bottom:6px;letter-spacing:1px">${t("appearance")}</div>
    <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid ${T.border}">
        <span style="font-size:13px">🌙 ${t("darkMode")}</span>
        <div onclick="CC.toggleDark()" style="width:40px;height:22px;border-radius:11px;background:${D.darkMode?C.primary:T.surfaceLighter};cursor:pointer;position:relative"><div style="width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:2px;left:${D.darkMode?20:2}px;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px">
        <span style="font-size:13px">🌐 ${t("language")}</span>
        <div style="display:flex;gap:3px">
          <button onclick="CC.setLang('en')" style="padding:3px 10px;border-radius:5px;border:1px solid ${D.language==="en"?C.primary:T.border};background:${D.language==="en"?C.primary+"22":"transparent"};color:${D.language==="en"?C.primary:T.textSec};font-size:11px;font-weight:600;cursor:pointer">EN</button>
          <button onclick="CC.setLang('zh')" style="padding:3px 10px;border-radius:5px;border:1px solid ${D.language==="zh"?C.primary:T.border};background:${D.language==="zh"?C.primary+"22":"transparent"};color:${D.language==="zh"?C.primary:T.textSec};font-size:11px;font-weight:600;cursor:pointer">中文</button>
        </div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:700;color:${T.textSec};margin-bottom:6px;letter-spacing:1px">${t("data")}</div>
    <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;margin-bottom:18px">
      <button onclick="CC.exportData()" style="display:block;width:100%;padding:12px 14px;background:none;border:none;border-bottom:1px solid ${T.border};color:${T.text};font-size:13px;text-align:left;cursor:pointer">📤 ${t("exportData")}</button>
      <button onclick="CC.importFile()" style="display:block;width:100%;padding:12px 14px;background:none;border:none;border-bottom:1px solid ${T.border};color:${T.text};font-size:13px;text-align:left;cursor:pointer">📥 ${t("importData")}</button>
      <button onclick="CC.resetData()" style="display:block;width:100%;padding:12px 14px;background:none;border:none;color:${C.accent};font-size:13px;text-align:left;cursor:pointer">🗑️ ${t("resetAllData")}</button>
    </div>
    <div style="font-size:10px;font-weight:700;color:${T.textSec};margin-bottom:6px;letter-spacing:1px">${t("about")}</div>
    <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:14px">
      <div style="font-size:12px;color:${T.textMuted}">⌘ ${t("version")}</div>
      <div style="font-size:11px;color:${T.textMuted};margin-top:3px">🔒 ${t("allDataLocal")}</div>
    </div>
  </div>`;
}

// Boot
render();
</script>
</body>
</html>
